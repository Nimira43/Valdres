@if (product) {
  <mat-card 
    appearance="raised"
    routerLink="/shop/{{product.id}}"  
    class="product-card"
  >
    <img 
      src="{{product.pictureUrl}}" 
      alt="image of {{product.name}}"
    >
    <mat-card-content class="mt-2">
      <h2 class="'text-sm font-medium uppercase">
        {{product.name}}
      </h2>
      <p class="font-light">
        {{product.price | currency: 'GBP' }}
      </p>
    </mat-card-content>
    <mat-card-actions>
      <button class="btn main-solid-btn w-full py-2">
        <mat-icon>add_shopping_cart</mat-icon>
        Add to Cart
      </button>
    </mat-card-actions>

  </mat-card>
}
