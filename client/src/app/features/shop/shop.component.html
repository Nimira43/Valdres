<div class="flex flex-col gap-3">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:flex-wrap">

    <form 
      #searchForm="ngForm" 
      (ngSubmit)="onSearchChange()"
      class="relative flex items-center w-full sm:flex-1 sm:min-w-48"
    >
      <input 
        type="search"
        class="block w-full p-2.5 text-sm outline-none border-2 border-main-dark focus:border-dark hover:border-dark rounded transitioning"
        placeholder="Search..." 
        name="search" 
        [(ngModel)]="shopParams.search" 
      />
      <button 
        mat-icon-button 
        type="submit" 
        class="absolute inset-y-0 right-0 flex items-center !text-main-dark"
      >
        <mat-icon>search</mat-icon>
      </button>
    </form>

    <div class="flex gap-3 shrink-0">
      <button 
        (click)="openFiltersDialog()" 
        class="btn main-outline-btn py-2 px-3"
      >
        <mat-icon>filter_list</mat-icon>
        Filters
      </button>
      <button 
        [matMenuTriggerFor]="sortMenu" 
        class="btn main-outline-btn py-2 px-3"
      >
        <mat-icon>swap_vert</mat-icon>
        Sort
      </button>
    </div>
  </div>

  <mat-paginator 
    (page)="handlePageEvent($event)" 
    [length]="products?.count" 
    [pageSize]="shopParams.pageSize"
    [showFirstLastButtons]="true" 
    [pageSizeOptions]="pageSizeOptions" 
    [pageIndex]="shopParams.pageNumber - 1"
    aria-label="Select page">
  </mat-paginator>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
    @for (product of products?.data; track product.id) {
      <app-product-item [product]="product"></app-product-item>
    }
  </div>

</div>

<mat-menu #sortMenu="matMenu">
  <mat-selection-list 
    [multiple]="false" 
    (selectionChange)="onSortChange($event)"
  >
    @for (sort of sortOptions; track $index) {
      <mat-list-option 
        [value]="sort.value" 
        [selected]="shopParams.sort === sort.value"
      >
        {{ sort.name }}
      </mat-list-option>
    }
  </mat-selection-list>
</mat-menu>
