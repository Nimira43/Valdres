<div>
  <h3 class="text-3xl text-center pt-6 mb-3">
    Filters
  </h3>
  <mat-divider></mat-divider>

  <div class="flex flex-col sm:flex-row p-4 gap-4">
    <div class="w-full sm:w-1/2">
      <h4 class="font-medium text-xl text-main-dark">
        Brands
      </h4>
      <mat-selection-list 
        [(ngModel)]="selectedBrands" 
        [multiple]="true"
      >
        @for (brand of shopService.brands; track $index) {
          <mat-list-option [value]="brand">
            {{brand}}
          </mat-list-option>
        }
      </mat-selection-list>
    </div>

    <div class="w-full sm:w-1/2">
      <h4 class="font-medium text-xl text-main-dark">
        Types
      </h4>
      <mat-selection-list 
        [(ngModel)]="selectedTypes" 
        [multiple]="true"
      >
        @for (type of shopService.types; track $index) {
          <mat-list-option [value]="type">
            {{type}}
          </mat-list-option>
        }
      </mat-selection-list>
    </div>
  </div>

  <div class="p-4">
    <button 
      (click)="applyFilters()" 
      class="btn main-solid-btn w-full py-2"
    >
      Apply Filters
    </button>
  </div>
</div>
