<header class="border-b shadow-md p-3 w-full bg-main-light">
  <div class="flex align-middle items-center justify-between max-w-screen-2xl mx-auto">
    <a 
      routerLink="/"
      class="text-xl text-main-dark logo-text"
    >
      Valdres
    </a>
    <nav class="flex gap-3 my-2 uppercase text-lg">
      <a 
        routerLink="/"
        routerLinkActive="active" 
        [routerLinkActiveOptions]="{exact:true}" 
      > 
        Home
      </a>
      <a 
        routerLink="/shop"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact:true}" 
      >
        Shop
      </a>
      <a>Contact</a>
    </nav>
    <div class="flex gap-3 align-middle">
      <a 
        matBadge="4" 
        matBadgeSize="small" 
        matBadgePosition="above after" 
        matBadgeColor="warn"
        class="custom-badge relative inline-flex items-center justify-center cursor-pointer self-center mr-3"
      >
        <mat-icon>shopping_cart</mat-icon>
      </a>
      <button class="btn main-outline-btn py-2 px-3">
        Login
      </button>
      
      <button class="btn main-outline-btn py-2 px-3">
        Register
      </button>
    </div>
  </div>
</header>
